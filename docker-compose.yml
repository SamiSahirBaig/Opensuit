services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: opensuite-postgres
    environment:
      POSTGRES_DB: opensuite
      POSTGRES_USER: opensuite
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opensuite_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U opensuite" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: opensuite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opensuite-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opensuite
      DB_USERNAME: opensuite
      DB_PASSWORD: ${DB_PASSWORD:-opensuite_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TEMP_DIR: /app/temp-files
      JAVA_OPTS: "-Xms256m -Xmx1g"
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8080:8080"
    volumes:
      - temp_files:/app/temp-files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opensuite-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://opensuite.io}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: opensuite-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    restart: unless-stopped

  # Certbot (Let's Encrypt SSL)
  certbot:
    image: certbot/certbot
    container_name: opensuite-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  temp_files:
  certbot_certs:
  certbot_www:
