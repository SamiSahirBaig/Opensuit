server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  servlet:
    context-path: /

spring:
  application:
    name: opensuite-backend

  # Default profile uses H2 for easy local development
  datasource:
    url: jdbc:h2:mem:opensuite;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Application-specific configuration
opensuite:
  storage:
    temp-dir: ${TEMP_DIR:./temp-files}
    max-file-size-mb: 50
    cleanup-interval-minutes: 10
    file-ttl-minutes: 60
  download:
    token-expiry-minutes: 10
  rate-limit:
    requests-per-minute: 30
    burst-capacity: 10
  libreoffice:
    path: ${LIBREOFFICE_PATH:/usr/bin/soffice}
    timeout-seconds: 120

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Logging
logging:
  level:
    root: INFO
    com.opensuite: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Sentry Error Tracking (disabled when SENTRY_DSN is empty)
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.1
  environment: development
  send-default-pii: false
  exception-resolver-order: -2147483647
